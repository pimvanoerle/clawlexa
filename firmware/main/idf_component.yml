## clawlexa main component dependencies.
## Managed components land in firmware/managed_components/ (gitignored).
## Exact versions are pinned in firmware/dependencies.lock (committed).
##
## Display/touch stack for the ESP32-S3-Touch-LCD-1.85C:
##   esp_lcd_st77916          QSPI round panel driver
##   esp_io_expander_tca9554  drives the PCA9554 (TCA-register-compatible);
##                            LCD reset hangs off expander pin 2, not a GPIO
##   esp_lvgl_port            LVGL 9 integration (decided UI framework, SPEC §8)
##   esp_lcd_touch_cst816s    capacitive touch over I2C
## Audio is pure I2S (PCM5101A DAC + ICS-43434 mic) — no codec component needed.
dependencies:
  idf:
    version: '>=5.4.0'
  espressif/esp_lcd_st77916: ^2.0.2
  espressif/esp_io_expander_tca9554: ^2.0.3
  espressif/esp_lvgl_port: ^2.8.0
  espressif/esp_lcd_touch_cst816s: ^1.1.1
  espressif/esp_websocket_client: ^1.7.0
  ## mDNS discovery of the bridge (_clawlexa._tcp); falls back to Kconfig host.
  espressif/mdns: ^1.2.0
  ## Phase 4 wake word: TFLite-Micro runtime for the microWakeWord model.
  espressif/esp-tflite-micro: ^1.3.7
