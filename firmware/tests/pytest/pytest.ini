[pytest]
# Default to the idf + serial_esp embedded services so `dut` is wired
# to a real connected board.
addopts =
    -ra
    --embedded-services=idf,esp,serial
    # Resolved relative to cwd; tests run as `cd firmware && pytest tests/pytest`.
    --app-path=.

testpaths = .
python_files = test_*.py
